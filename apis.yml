aid: trustarc
name: TrustArc
description: >-
  TrustArc is a Walnut Creek, California enterprise privacy management
  platform that helps organizations operationalize global data privacy
  programs. Its product portfolio spans three suites. Privacy Studio
  covers consumer-facing consent and rights with Cookie Consent Manager,
  Consent & Preference Manager, Individual Rights Manager (DSR
  automation), and the Unified Trust Center. The Governance Suite covers
  internal privacy program operations with PrivacyCentral, Data Mapping
  & Risk Manager, Assessment Manager (PIA/DPIA/TIA), and Nymity Research
  for regulatory intelligence. Assurance Services delivers third-party
  attestations including Data Privacy Framework verification, GDPR and
  CCPA/CPRA validation, APEC CBPR/PRP, and TRUSTe Responsible AI
  Certification. TrustArc exposes a developer surface through gated APIs
  documented in the customer help center — including the Gateway API,
  Individual Rights Manager Rapid/Client APIs, Cookie Consent Manager
  Reporting API, Consent & Preference Manager Rapid/Standard APIs, and
  Assessment Manager Internal API — plus a Mobile Consent SDK (iOS),
  300+ prebuilt connectors to platforms such as Salesforce, HubSpot,
  Marketo, Adobe Experience Manager, Microsoft Dynamics, Jira, and
  Google Workspace, and a Google Consent Mode v2 template published on
  GitHub. Founded over 28 years ago and serving 1,500+ enterprises
  including Abbott, ADP, GE, Nike, and Starbucks, TrustArc operates on a
  commercial SaaS model; complete API specifications are not publicly
  available.
